<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GGT — Gentlemen's Golf Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Cormorant+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #06140c; overflow: hidden; }

  @keyframes ggtFadeIn { from { opacity: 0; } to { opacity: 1; } }

  @keyframes ggtCrestIn {
    0%   { opacity: 0; transform: translateY(14px) scale(0.86); filter: blur(6px); }
    60%  { opacity: 1; filter: blur(0); }
    78%  { transform: translateY(0) scale(1.02); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @keyframes ggtSheen {
    0%   { transform: translateX(-160%) skewX(-18deg); opacity: 0; }
    18%  { opacity: 0.85; }
    100% { transform: translateX(160%) skewX(-18deg); opacity: 0; }
  }

  @keyframes ggtRiseUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes ggtRule {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }

  @keyframes ggtBreathe {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    50%      { opacity: 0.6; transform: scale(1.12); }
  }

  @keyframes ggtDrift {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    12%  { opacity: var(--p, 0.5); }
    88%  { opacity: var(--p, 0.5); }
    100% { transform: translateY(-120px) translateX(var(--dx, 20px)); opacity: 0; }
  }

  @keyframes ggtGlint {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1; }
  }

  @keyframes ggtDropBounce {
    0%   { transform: translateY(-330px) scale(1); opacity: 0; animation-timing-function: cubic-bezier(0.45,0,0.85,0.5); }
    10%  { opacity: 1; }
    36%  { transform: translateY(0) scaleX(1.16) scaleY(0.8); opacity: 1; animation-timing-function: cubic-bezier(0.1,0.55,0.3,1); }
    42%  { transform: translateY(0) scale(1); }
    58%  { transform: translateY(-92px) scale(1); animation-timing-function: cubic-bezier(0.45,0,0.85,0.5); }
    73%  { transform: translateY(0) scaleX(1.1) scaleY(0.88); animation-timing-function: cubic-bezier(0.1,0.55,0.3,1); }
    78%  { transform: translateY(0) scale(1); }
    87%  { transform: translateY(-30px) scale(1); animation-timing-function: cubic-bezier(0.45,0,0.85,0.5); }
    95%  { transform: translateY(0) scaleX(1.05) scaleY(0.95); }
    100% { transform: translateY(0) scale(1); }
  }

  .scene {
    position: fixed; inset: 0; overflow: hidden;
    background: radial-gradient(120% 90% at 50% 36%, #163a25 0%, #0d2718 42%, #06140c 100%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    animation: ggtFadeIn 0.7s ease both;
  }

  .texture {
    position: absolute; inset: 0; opacity: 0.06;
    background-image: repeating-linear-gradient(45deg, #c7a96a 0, #c7a96a 1px, transparent 1px, transparent 7px);
    pointer-events: none;
  }

  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(115% 80% at 50% 42%, transparent 48%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  .glow {
    position: absolute; left: 50%; top: 40%;
    width: 760px; height: 760px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(199,169,106,0.22) 0%, transparent 62%);
    filter: blur(8px);
    animation: ggtBreathe 6s ease-in-out infinite;
    pointer-events: none;
  }

  .dust {
    position: absolute; border-radius: 50%;
    background: #d8bd84; pointer-events: none;
  }

  .centerpiece {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 32px;
  }

  .crest-wrap {
    position: relative;
    width: min(38vh, 300px);
    aspect-ratio: 1;
    animation: ggtCrestIn 1.5s cubic-bezier(0.22,1,0.36,1) 0.4s both;
  }

  .crest-wrap img.crest-logo {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    filter: drop-shadow(0 14px 34px rgba(0,0,0,0.55))
            drop-shadow(0 0 18px rgba(199,169,106,0.25));
  }

  .ball-wrap {
    position: absolute; left: 50.8%; top: 64.8%;
    width: 20%; transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .ball-wrap img {
    width: 100%; height: auto; display: block;
    transform-origin: 50% 100%;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.45))
            drop-shadow(0 0 6px rgba(227,205,150,0.35));
    animation: ggtDropBounce 1.5s 1.4s both;
  }

  .sheen-mask {
    position: absolute; inset: 0; overflow: hidden;
    -webkit-mask-image: url(logo.png);
    mask-image: url(logo.png);
    -webkit-mask-size: contain; mask-size: contain;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    pointer-events: none;
  }

  .sheen-bar {
    position: absolute; top: -20%; left: 0;
    width: 42%; height: 140%;
    background: linear-gradient(90deg, transparent, rgba(255,247,224,0.9), transparent);
    animation: ggtSheen 1.1s ease-out 3.1s both;
  }

  .wordmark {
    margin-top: 34px;
    animation: ggtRiseUp 0.9s cubic-bezier(0.22,1,0.36,1) 3.1s both;
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    font-weight: 600;
    letter-spacing: 0.42em; text-indent: 0.42em;
    font-size: clamp(20px, 3.6vw, 38px);
    color: #e7d6a8; line-height: 1.1;
  }

  .est-row {
    display: flex; align-items: center;
    gap: 18px; margin-top: 20px;
  }

  .est-rule {
    display: block;
    width: clamp(40px, 9vw, 96px); height: 1px;
    animation: ggtRule 0.8s ease 3.4s both;
  }
  .est-rule.left {
    background: linear-gradient(90deg, transparent, #c7a96a);
    transform-origin: right;
  }
  .est-rule.right {
    background: linear-gradient(90deg, #c7a96a, transparent);
    transform-origin: left;
  }

  .est-text {
    font-family: 'Cormorant SC', serif;
    font-weight: 500;
    letter-spacing: 0.34em; text-indent: 0.34em;
    font-size: clamp(11px, 1.5vw, 15px);
    color: #c7a96a; white-space: nowrap;
    animation: ggtFadeIn 0.7s ease 3.6s both;
  }

  .enter-btn {
    margin-top: 38px;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 34px;
    border: 1px solid rgba(199,169,106,0.55);
    border-radius: 2px;
    color: #e7d6a8; text-decoration: none;
    font-family: 'Cormorant SC', serif; font-weight: 600;
    letter-spacing: 0.26em; text-indent: 0.26em;
    font-size: clamp(12px, 1.4vw, 15px);
    background: rgba(199,169,106,0.06);
    transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
    animation: ggtRiseUp 0.9s ease 4.0s both;
  }
  .enter-btn:hover {
    background: rgba(199,169,106,0.16);
    border-color: #c7a96a;
    color: #fff6e2;
  }

  .enter-arrow {
    display: inline-block;
    animation: ggtGlint 2.4s ease-in-out 4.4s infinite;
  }

  .replay-btn {
    position: absolute; right: 22px; bottom: 20px;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(199,169,106,0.4);
    background: rgba(0,0,0,0.25);
    color: #c7a96a; cursor: pointer;
    font-family: serif; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    animation: ggtFadeIn 0.7s ease 4.9s both;
    transition: border-color 0.3s, color 0.3s;
  }
  .replay-btn:hover {
    border-color: #c7a96a;
    color: #fff6e2;
  }

  .pw-overlay {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(6,20,12,0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  .pw-overlay.active { opacity: 1; visibility: visible; }

  .pw-box {
    width: min(90vw, 380px);
    background: radial-gradient(120% 100% at 50% 30%, #1a3d28, #0d2718);
    border: 1px solid rgba(199,169,106,0.35);
    border-radius: 4px;
    padding: 40px 32px 32px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 40px rgba(199,169,106,0.08);
    transform: translateY(20px) scale(0.95);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .pw-overlay.active .pw-box {
    transform: translateY(0) scale(1);
  }

  .pw-icon {
    font-size: 28px; margin-bottom: 16px;
    color: #c7a96a;
  }

  .pw-title {
    font-family: 'Cormorant SC', serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 0.2em; text-indent: 0.2em;
    color: #e7d6a8;
    margin-bottom: 6px;
  }

  .pw-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: rgba(199,169,106,0.6);
    font-style: italic;
    margin-bottom: 24px;
  }

  .pw-field {
    position: relative;
    margin-bottom: 18px;
  }

  .pw-input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(199,169,106,0.3);
    border-radius: 2px;
    color: #e7d6a8;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .pw-input::placeholder {
    color: rgba(199,169,106,0.3);
    font-style: italic;
  }
  .pw-input:focus {
    border-color: #c7a96a;
    box-shadow: 0 0 12px rgba(199,169,106,0.15);
  }
  .pw-input.error {
    border-color: #c0392b;
    animation: pwShake 0.4s ease;
  }

  @keyframes pwShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .pw-error-msg {
    color: #e74c3c;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    margin-top: -12px;
    margin-bottom: 14px;
    height: 18px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pw-error-msg.show { opacity: 1; }

  .pw-submit {
    width: 100%;
    padding: 13px 24px;
    border: 1px solid rgba(199,169,106,0.55);
    border-radius: 2px;
    background: rgba(199,169,106,0.1);
    color: #e7d6a8;
    font-family: 'Cormorant SC', serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.22em; text-indent: 0.22em;
    cursor: pointer;
    transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
  }
  .pw-submit:hover {
    background: rgba(199,169,106,0.2);
    border-color: #c7a96a;
    color: #fff6e2;
  }

  .pw-close {
    position: absolute; top: 12px; right: 14px;
    width: 30px; height: 30px;
    background: none; border: none;
    color: rgba(199,169,106,0.4);
    font-size: 20px; cursor: pointer;
    transition: color 0.3s ease;
  }
  .pw-close:hover { color: #e7d6a8; }

  @media (max-width: 500px) {
    .crest-wrap { width: min(50vh, 220px); }
    .wordmark { letter-spacing: 0.25em; text-indent: 0.25em; }
    .enter-btn { padding: 12px 24px; letter-spacing: 0.18em; text-indent: 0.18em; }
    .pw-box { padding: 32px 24px 24px; }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="texture"></div>
  <div class="vignette"></div>
  <div class="glow"></div>

  <div class="dust" style="left:18%; bottom:18%; width:3px; height:3px; --p:0.5; --dx:24px; animation:ggtDrift 7s ease-in-out 1s infinite; box-shadow:0 0 6px #d8bd84;"></div>
  <div class="dust" style="left:32%; bottom:12%; width:2px; height:2px; --p:0.4; --dx:-18px; animation:ggtDrift 9s ease-in-out 2.2s infinite; box-shadow:0 0 5px #d8bd84;"></div>
  <div class="dust" style="left:62%; bottom:20%; width:2.5px; height:2.5px; --p:0.55; --dx:20px; animation:ggtDrift 8s ease-in-out 0.4s infinite; box-shadow:0 0 6px #d8bd84;"></div>
  <div class="dust" style="left:74%; bottom:14%; width:2px; height:2px; --p:0.35; --dx:-26px; animation:ggtDrift 10s ease-in-out 3s infinite; box-shadow:0 0 5px #d8bd84;"></div>
  <div class="dust" style="left:46%; bottom:24%; width:3px; height:3px; --p:0.5; --dx:14px; animation:ggtDrift 7.5s ease-in-out 1.8s infinite; box-shadow:0 0 7px #d8bd84;"></div>

  <div class="centerpiece" id="centerpiece">
    <div class="crest-wrap">
      <img src="logo-noball.png" alt="Gentlemen's Golf Tour crest" class="crest-logo">
      <div class="ball-wrap">
        <img src="golfball.png" alt="golf ball">
      </div>
      <div class="sheen-mask">
        <div class="sheen-bar"></div>
      </div>
    </div>

    <div class="wordmark">GENTLEMEN'S GOLF TOUR</div>

    <div class="est-row">
      <span class="est-rule left"></span>
      <span class="est-text">EST. 2012</span>
      <span class="est-rule right"></span>
    </div>

    <a href="site.html" class="enter-btn">
      ENTER THE TOUR
      <span class="enter-arrow">&rarr;</span>
    </a>
  </div>

  <button class="replay-btn" id="replayBtn" title="Replay intro">&#8634;</button>
</div>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <button class="pw-close" id="pwClose">&times;</button>
    <div class="pw-icon">&#9971;</div>
    <div class="pw-title">MEMBERS ONLY</div>
    <div class="pw-sub">Enter the password to continue</div>
    <div class="pw-field">
      <input type="password" class="pw-input" id="pwInput" placeholder="Password" autocomplete="off">
    </div>
    <div class="pw-error-msg" id="pwError">Wrong password, mate. Try again.</div>
    <button class="pw-submit" id="pwSubmit">ENTER</button>
  </div>
</div>

<script>
(function(){
  var k = [66,117,99,107,87,105,108,108,70,117,99,107];
  function check(v){ return v === String.fromCharCode.apply(null,k); }

  function openGate(e){
    e.preventDefault();
    var ov = document.getElementById('pwOverlay');
    var inp = document.getElementById('pwInput');
    ov.classList.add('active');
    setTimeout(function(){ inp.focus(); }, 350);
  }

  function attempt(){
    var inp = document.getElementById('pwInput');
    var err = document.getElementById('pwError');
    if(check(inp.value)){
      window.location.href = 'site.html';
    } else {
      inp.classList.add('error');
      err.classList.add('show');
      setTimeout(function(){ inp.classList.remove('error'); }, 400);
      setTimeout(function(){ err.classList.remove('show'); }, 2500);
    }
  }

  function closeGate(){
    var ov = document.getElementById('pwOverlay');
    var inp = document.getElementById('pwInput');
    var err = document.getElementById('pwError');
    ov.classList.remove('active');
    inp.value = '';
    inp.classList.remove('error');
    err.classList.remove('show');
  }

  document.querySelector('.enter-btn').addEventListener('click', openGate);
  document.getElementById('pwSubmit').addEventListener('click', attempt);
  document.getElementById('pwInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') attempt();
  });
  document.getElementById('pwClose').addEventListener('click', closeGate);
  document.getElementById('pwOverlay').addEventListener('click', function(e){
    if(e.target === this) closeGate();
  });

  document.getElementById('replayBtn').addEventListener('click', function() {
    var cp = document.getElementById('centerpiece');
    var scene = document.getElementById('scene');
    var clone = cp.cloneNode(true);
    cp.remove();
    scene.insertBefore(clone, document.getElementById('replayBtn'));
    clone.querySelector('.enter-btn').addEventListener('click', openGate);
    document.getElementById('replayBtn').addEventListener('click', arguments.callee);
  });
})();
</script>
</body>
</html>
